<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LD Automation Suite</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --danger: #ef4444; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            scroll-behavior: smooth; /* Makes the jump to sections smooth */
        }

        /* --- HEADER --- */
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; }
        header p { margin-top: 10px; opacity: 0.8; }

        /* --- NAVIGATION BAR --- */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px 20px;
            flex-wrap: wrap;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 90; 
        }

        .nav-btn {
            text-decoration: none;
            color: var(--text);
            background: #e2e8f0;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .nav-btn:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        /* --- MAIN CONTENT --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        .tool-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 60px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 40px;
            align-items: center;
            scroll-margin-top: 100px;
            border: 1px solid #e2e8f0;
        }
        
        /* Alternating Layout: Even numbers have reversed direction */
        .tool-section:nth-child(even) { flex-direction: row-reverse; }

        .tool-content { flex: 1; }
        
        .tool-image { 
            flex: 1; 
            background: #f1f5f9; 
            height: 250px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border: 2px dashed #cbd5e1;
            overflow: hidden;
        }
        .tool-image img { width: 100%; height: 100%; object
